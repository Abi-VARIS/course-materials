<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Basecamp Coffee Personality Quiz</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #FDF6EC;
    --warm-white: #FFFAF3;
    --brown-dark: #3E2723;
    --brown-medium: #5D4037;
    --brown-light: #8D6E63;
    --green-muted: #7A8B6F;
    --terracotta: #C17C60;
    --gold: #D4A056;
    --text-primary: #3E2723;
    --text-secondary: #6D4C41;
    --border: #E0D5C7;
    --shadow: rgba(62, 39, 35, 0.08);

    /* Type accent colors */
    --bold-adventurer: #8B5E3C;
    --campfire-connector: #C17C60;
    --cozy-ritualist: #7A8B6F;
    --flavor-explorer: #D4A056;
  }

  body {
    font-family: -apple-system, 'Segoe UI', system-ui, Roboto, Helvetica, Arial, sans-serif;
    background: var(--cream);
    color: var(--text-primary);
    line-height: 1.6;
    min-height: 100vh;
  }

  .container {
    max-width: 640px;
    margin: 0 auto;
    padding: 24px 20px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Progress Bar */
  .progress-bar-wrapper {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 6px;
    background: var(--border);
    z-index: 100;
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  .progress-bar-wrapper.visible { opacity: 1; }

  .progress-bar {
    height: 100%;
    background: var(--brown-medium);
    border-radius: 0 3px 3px 0;
    transition: width 0.4s ease;
    width: 0%;
  }

  .progress-text {
    text-align: center;
    font-size: 14px;
    color: var(--text-secondary);
    margin-bottom: 24px;
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  .progress-text.visible { opacity: 1; }

  /* Screens */
  .screen {
    display: none;
    flex: 1;
    flex-direction: column;
    justify-content: center;
    animation: fadeIn 0.4s ease;
  }
  .screen.active { display: flex; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Welcome Screen */
  .welcome { text-align: center; }

  .welcome h1 {
    font-size: 32px;
    font-weight: 700;
    color: var(--brown-dark);
    margin-bottom: 8px;
    letter-spacing: -0.5px;
  }

  .welcome .subtitle {
    font-size: 18px;
    color: var(--brown-light);
    margin-bottom: 32px;
  }

  .welcome .intro {
    font-size: 16px;
    color: var(--text-secondary);
    max-width: 480px;
    margin: 0 auto 40px;
  }

  .btn-primary {
    display: inline-block;
    background: var(--brown-medium);
    color: var(--warm-white);
    border: none;
    padding: 16px 48px;
    font-size: 17px;
    font-weight: 600;
    border-radius: 12px;
    cursor: pointer;
    transition: background 0.2s ease, transform 0.15s ease;
    font-family: inherit;
  }
  .btn-primary:hover { background: var(--brown-dark); transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }

  /* Question Screen */
  .question-card {
    background: var(--warm-white);
    border-radius: 16px;
    padding: 32px 28px;
    box-shadow: 0 2px 16px var(--shadow);
    border: 1px solid var(--border);
    transition: opacity 0.2s ease, transform 0.2s ease;
  }

  .question-card h2 {
    font-size: 20px;
    font-weight: 600;
    color: var(--brown-dark);
    margin-bottom: 24px;
    line-height: 1.4;
  }

  .answers {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .answer-btn {
    width: 100%;
    text-align: left;
    background: var(--cream);
    color: var(--text-primary);
    border: 2px solid var(--border);
    padding: 16px 20px;
    font-size: 15px;
    line-height: 1.4;
    border-radius: 12px;
    cursor: pointer;
    transition: border-color 0.2s ease, background 0.2s ease, transform 0.15s ease;
    font-family: inherit;
  }
  .answer-btn:hover {
    border-color: var(--brown-light);
    background: var(--warm-white);
    transform: translateX(4px);
  }
  .answer-btn:active { transform: translateX(2px); }

  /* Result Screen */
  .result { align-items: stretch; }

  .result-header {
    text-align: center;
    padding: 40px 24px 32px;
    border-radius: 20px;
    margin-bottom: 24px;
    color: white;
  }

  .result-header .label {
    font-size: 14px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    opacity: 0.85;
    margin-bottom: 8px;
  }

  .result-header h1 {
    font-size: 32px;
    font-weight: 700;
    margin-bottom: 8px;
  }

  .result-header .tagline {
    font-size: 18px;
    font-style: italic;
    opacity: 0.9;
  }

  .result-header .secondary-type {
    margin-top: 16px;
    font-size: 14px;
    opacity: 0.8;
    background: rgba(255,255,255,0.15);
    display: inline-block;
    padding: 6px 16px;
    border-radius: 20px;
  }

  .result-card {
    background: var(--warm-white);
    border-radius: 16px;
    padding: 28px 24px;
    box-shadow: 0 2px 16px var(--shadow);
    border: 1px solid var(--border);
    margin-bottom: 16px;
  }

  .result-card h3 {
    font-size: 16px;
    font-weight: 700;
    color: var(--brown-dark);
    margin-bottom: 16px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .result-card p {
    font-size: 15px;
    color: var(--text-secondary);
    line-height: 1.7;
  }

  .traits-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .traits-list li {
    font-size: 15px;
    color: var(--text-secondary);
    line-height: 1.5;
    padding-left: 20px;
    position: relative;
  }
  .traits-list li::before {
    content: '';
    position: absolute;
    left: 0;
    top: 8px;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--brown-light);
  }

  .drinks-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .drinks-list li {
    font-size: 15px;
    color: var(--text-secondary);
    line-height: 1.5;
  }

  .drinks-list .drink-name {
    font-weight: 600;
    color: var(--text-primary);
  }

  .nudge-text {
    font-size: 15px;
    color: var(--text-secondary);
    line-height: 1.7;
    background: var(--cream);
    padding: 20px;
    border-radius: 12px;
    border-left: 4px solid var(--brown-light);
  }

  .share-section {
    background: var(--cream);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 12px;
  }

  .share-text {
    font-size: 14px;
    color: var(--text-secondary);
    line-height: 1.6;
    margin-bottom: 12px;
    white-space: pre-wrap;
  }

  .btn-copy {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--brown-medium);
    color: white;
    border: none;
    padding: 10px 20px;
    font-size: 14px;
    font-weight: 600;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.2s ease;
    font-family: inherit;
  }
  .btn-copy:hover { background: var(--brown-dark); }
  .btn-copy.copied { background: var(--green-muted); }

  .btn-retake {
    display: block;
    width: 100%;
    text-align: center;
    background: transparent;
    color: var(--brown-medium);
    border: 2px solid var(--brown-medium);
    padding: 16px;
    font-size: 16px;
    font-weight: 600;
    border-radius: 12px;
    cursor: pointer;
    transition: background 0.2s ease, color 0.2s ease;
    margin-top: 8px;
    font-family: inherit;
  }
  .btn-retake:hover { background: var(--brown-medium); color: white; }

  /* Type-specific accent colors on result header */
  .result-header.bold-adventurer { background: linear-gradient(135deg, #6D4C41, #8B5E3C); }
  .result-header.campfire-connector { background: linear-gradient(135deg, #A0604B, #C17C60); }
  .result-header.cozy-ritualist { background: linear-gradient(135deg, #5F6F52, #7A8B6F); }
  .result-header.flavor-explorer { background: linear-gradient(135deg, #B8873E, #D4A056); }

  /* Mobile adjustments */
  @media (max-width: 480px) {
    .container { padding: 16px 16px; }
    .welcome h1 { font-size: 26px; }
    .welcome .subtitle { font-size: 16px; }
    .question-card { padding: 24px 20px; }
    .question-card h2 { font-size: 18px; }
    .answer-btn { padding: 14px 16px; font-size: 14px; }
    .result-header h1 { font-size: 26px; }
    .result-card { padding: 24px 20px; }
  }
</style>
</head>
<body>

<div class="progress-bar-wrapper" id="progressWrapper">
  <div class="progress-bar" id="progressBar"></div>
</div>

<div class="container">
  <p class="progress-text" id="progressText"></p>

  <!-- Welcome Screen -->

    <div class="welcome">

  <!-- Question Screen -->
  <div class="screen" id="questionScreen">
    <div class="question-card">
      <h2 id="questionText"></h2>
      <div class="answers" id="answersContainer"></div>
    </div>
  </div>

  <!-- Result Screen -->
  <div class="screen" id="resultScreen">
    <div class="result" id="resultContent"></div>
  </div>
</div>

// Adjacent quadrant mapping for secondary type
// [0] shares adventure axis (differs on social), [1] shares social axis (differs on adventure)
const adjacentTypes = {
  "Bold Adventurer": ["Flavor Explorer", "Cozy Ritualist"],
  "Flavor Explorer": ["Bold Adventurer", "Campfire Connector"],
  "Cozy Ritualist": ["Campfire Connector", "Bold Adventurer"],
  "Campfire Connector": ["Cozy Ritualist", "Flavor Explorer"]
};

let currentQuestion = 0;
let scores = { adventure: 0, social: 0 };

function startQuiz() {
  currentQuestion = 0;
  scores = { adventure: 0, social: 0 };
  showScreen("questionScreen");
  document.getElementById("progressWrapper").classList.add("visible");
  document.getElementById("progressText").classList.add("visible");
  renderQuestion();
}

function showScreen(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function renderQuestion() {
  const q = questions[currentQuestion];
  document.getElementById("questionText").textContent = q.text;
  document.getElementById("progressText").textContent = `Question ${currentQuestion + 1} of ${questions.length}`;
  document.getElementById("progressBar").style.width = ((currentQuestion) / questions.length * 100) + "%";

  const container = document.getElementById("answersContainer");
  container.innerHTML = "";

  // Shuffle answer order for each render
  const shuffled = q.answers.map((a, i) => ({ ...a, origIndex: i }));
  for (let i = shuffled.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
  }

  shuffled.forEach(answer => {
    const btn = document.createElement("button");
    btn.className = "answer-btn";
    btn.textContent = answer.text;
    btn.addEventListener("click", () => selectAnswer(q.axis, answer.score));
    container.appendChild(btn);
  });
}

function selectAnswer(axis, score) {
  scores[axis] += score;
  currentQuestion++;

  if (currentQuestion < questions.length) {
    // Brief delay for transition feel
    const card = document.querySelector(".question-card");
    card.style.opacity = "0";
    card.style.transform = "translateY(12px)";
    setTimeout(() => {
      renderQuestion();
      card.style.opacity = "1";
      card.style.transform = "translateY(0)";
    }, 200);
  } else {
    document.getElementById("progressBar").style.width = "100%";
    setTimeout(() => {
      document.getElementById("progressWrapper").classList.remove("visible");
      document.getElementById("progressText").classList.remove("visible");
      showResult();
    }, 400);
  }
}

function getPersonalityType(adventure, social) {
  if (adventure > 0 && social <= 0) return "Bold Adventurer";
  if (adventure > 0 && social > 0) return "Flavor Explorer";
  if (adventure <= 0 && social <= 0) return "Cozy Ritualist";
  return "Campfire Connector";
}

function getSecondaryType(adventure, social, primary) {
  // The secondary type is the adjacent quadrant closest to the user's score
  const candidates = adjacentTypes[primary];
  // Determine which axis is closer to the boundary
  const adventureDist = Math.abs(adventure);
  const socialDist = Math.abs(social);

  // The axis closer to 0 determines which adjacent quadrant
  // Adjacent types: first shares adventure axis, second shares social axis
  if (adventureDist <= socialDist) {
    // Closer to flipping on adventure axis → the adjacent that differs on adventure
    // candidates[1] shares the social axis (differs on adventure)
    return candidates[1];
  } else {
    // Closer to flipping on social axis → the adjacent that differs on social
    // candidates[0] shares the adventure axis (differs on social)
    return candidates[0];
  }
}

function showResult() {
  const primary = getPersonalityType(scores.adventure, scores.social);
  const secondary = getSecondaryType(scores.adventure, scores.social, primary);
  const type = personalityTypes[primary];

  showScreen("resultScreen");

  document.getElementById("resultContent").innerHTML = `
    <div class="result-header ${type.cssClass}">
      <div class="label">You are a</div>
      <h1>${primary}</h1>
      <div class="tagline">${type.tagline}</div>
      <div class="secondary-type">with a ${secondary} streak</div>
    </div>

    <div class="result-card">
      <h3>About You</h3>
      <p>${type.description}</p>
    </div>

    <div class="result-card">
      <h3>Core Traits</h3>
      <ul class="traits-list">
        ${type.traits.map(t => `<li>${t}</li>`).join("")}
      </ul>
    </div>

    <div class="result-card">
      <h3>Your Drinks</h3>
      <ul class="drinks-list">
        ${type.drinks.map(d => `<li><span class="drink-name">${d.name}</span> &mdash; ${d.desc}</li>`).join("")}
      </ul>
    </div>

    <div class="result-card">
      <h3>Your Next Adventure</h3>
      <div class="nudge-text"><strong>Try next:</strong> ${type.nudge}</div>
    </div>

    <div class="result-card">
      <h3>Share Your Result</h3>
      <div class="share-section">
        <div class="share-text">${type.shareText}</div>
        <button class="btn-copy" onclick="copyShareText(this)">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="5.5" y="5.5" width="8" height="8" rx="1.5"/><path d="M10.5 5.5V3.5a1.5 1.5 0 0 0-1.5-1.5H3.5A1.5 1.5 0 0 0 2 3.5V9a1.5 1.5 0 0 0 1.5 1.5h2"/></svg>
          Copy
        </button>
      </div>
    </div>

    <button class="btn-retake" onclick="retakeQuiz()">Retake Quiz</button>
  `;

  window.scrollTo({ top: 0, behavior: "smooth" });
}

function copyShareText(btn) {
  const text = btn.closest(".share-section").querySelector(".share-text").textContent;
  navigator.clipboard.writeText(text).then(() => {
    btn.classList.add("copied");
    btn.innerHTML = `
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8.5l3 3 7-7"/></svg>
      Copied!
    `;
    setTimeout(() => {
      btn.classList.remove("copied");
      btn.innerHTML = `
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="5.5" y="5.5" width="8" height="8" rx="1.5"/><path d="M10.5 5.5V3.5a1.5 1.5 0 0 0-1.5-1.5H3.5A1.5 1.5 0 0 0 2 3.5V9a1.5 1.5 0 0 0 1.5 1.5h2"/></svg>
        Copy
      `;
    }, 2000);
  });
}

function retakeQuiz() {
  window.scrollTo({ top: 0, behavior: "smooth" });
  setTimeout(() => startQuiz(), 300);
}
</script>
</body>
</html>
